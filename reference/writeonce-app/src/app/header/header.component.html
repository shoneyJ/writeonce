<header class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-50 transition-colors duration-300">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-16">
      <a routerLink="/" class="flex items-center space-x-2">
        <img src="assets/images/logo.png" alt="WriteOnce" class="h-8 w-auto">
        <span class="text-xl font-bold text-slate-800 dark:text-white hidden sm:inline">WriteOnce</span>
      </a>
      
      <nav class="hidden md:flex items-center space-x-6">
        <a routerLink="/" routerLinkActive="text-teal-600 dark:text-teal-400" [routerLinkActiveOptions]="{exact: true}" class="text-slate-600 dark:text-slate-300 hover:text-teal-600 dark:hover:text-teal-400 transition-colors">Home</a>
        <a routerLink="/projects" routerLinkActive="text-teal-600 dark:text-teal-400" class="text-slate-600 dark:text-slate-300 hover:text-teal-600 dark:hover:text-teal-400 transition-colors">Projects</a>
        <a routerLink="/about" routerLinkActive="text-teal-600 dark:text-teal-400" class="text-slate-600 dark:text-slate-300 hover:text-teal-600 dark:hover:text-teal-400 transition-colors">About</a>
        <a routerLink="/contact" routerLinkActive="text-teal-600 dark:text-teal-400" class="text-slate-600 dark:text-slate-300 hover:text-teal-600 dark:hover:text-teal-400 transition-colors">Contact</a>
      </nav>

      <div class="flex items-center space-x-3">
        <button (click)="toggleTheme()" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors" aria-label="Toggle dark mode">
          <svg *ngIf="!themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
          <svg *ngIf="themeService.isDarkMode()" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </button>

        <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300" aria-label="Toggle menu">
          <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <div *ngIf="isMobileMenuOpen" class="md:hidden pb-4">
      <nav class="flex flex-col space-y-2">
        <a routerLink="/" (click)="closeMobileMenu()" class="px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Home</a>
        <a routerLink="/projects" (click)="closeMobileMenu()" class="px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Projects</a>
        <a routerLink="/about" (click)="closeMobileMenu()" class="px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">About</a>
        <a routerLink="/contact" (click)="closeMobileMenu()" class="px-3 py-2 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Contact</a>
      </nav>
    </div>
  </div>
</header>
