<section class="article-section mb-8">
    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-4">{{heading}}</h2>

    <ng-container *ngFor="let paragraph of paragraphs;let i = index ">

        <p class="text-slate-700 dark:text-slate-300 mb-4 leading-relaxed">{{ paragraph }}</p>
        <ng-container #dynamicCodeSnippetComponent></ng-container>
        <ng-container #dynamicImageComponent></ng-container>
    </ng-container>



</section>
